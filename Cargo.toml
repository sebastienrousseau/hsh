[workspace]
resolver = "2"
members = ["crates/hsh"]

[workspace.package]
authors       = ["Sebastien Rousseau <sebastian.rousseau@gmail.com>", "The Hash (HSH) library contributors"]
edition       = "2021"
rust-version  = "1.75"
license       = "MIT OR Apache-2.0"
repository    = "https://github.com/sebastienrousseau/hsh"
homepage      = "https://hshlib.com/"
documentation = "https://docs.rs/hsh"
categories    = ["authentication", "cryptography"]
keywords      = ["argon2id", "password", "phc", "kdf", "scrypt"]

[workspace.dependencies]
# Foundation
password-hash = { version = "0.6", default-features = false, features = ["alloc"] }
subtle        = "2.6"
zeroize       = { version = "1.8", features = ["zeroize_derive"] }
thiserror     = "2.0"
rand_core     = { version = "0.9", features = ["os_rng"] }

# Existing algorithm crates (will be replaced/realigned in Phase 1)
argon2rs   = "0.2.5"
base64     = "0.22.1"
bcrypt     = "0.16.0"
scrypt     = "0.11.0"
serde      = { version = "1.0.216", features = ["derive"] }
serde_json = "1.0.137"
log        = { version = "0.4.25", features = ["std"] }
dtt        = "0.0.9"
vrd        = "0.0.8"

# Dev
assert_cmd = "2.0.14"
criterion  = "0.5.1"

[profile.dev]
codegen-units    = 256
debug            = true
debug-assertions = true
incremental      = true
lto              = false
opt-level        = 0
overflow-checks  = true
panic            = "unwind"
rpath            = false
strip            = false

[profile.release]
codegen-units    = 1
debug            = false
debug-assertions = false
incremental      = false
lto              = true
opt-level        = 3
overflow-checks  = true       # security-critical: arithmetic on cost parameters must not silently wrap
panic            = "abort"
rpath            = false
strip            = "symbols"

[profile.test]
codegen-units    = 256
debug            = true
debug-assertions = true
incremental      = true
lto              = false
opt-level        = 0
overflow-checks  = true
rpath            = false
strip            = false

[profile.bench]
debug = true
