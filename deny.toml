# cargo-deny configuration for `hsh`.
#
# Run with:
#   cargo deny check         # all sections
#   cargo deny check advisories
#   cargo deny check licenses
#   cargo deny check bans
#   cargo deny check sources

[graph]
# Target triples to evaluate. Default = host. Phase 5 release work adds
# explicit cross-target entries here.
all-features = true

# ---------------------------------------------------------------------------
# Advisories (RustSec)
# ---------------------------------------------------------------------------
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/RustSec/advisory-db"]
# Stop the build on *any* known vulnerability or unsoundness, no
# exceptions. Use the `ignore` list with a justification comment when a
# truly unavoidable advisory comes up.
yanked = "deny"
ignore = []

# ---------------------------------------------------------------------------
# Licenses
# ---------------------------------------------------------------------------
[licenses]
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
]
# Crates whose embedded license file we trust even if SPDX guess is fuzzy.
exceptions = []

[[licenses.clarify]]
name       = "ring"
expression = "ISC AND MIT AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

# ---------------------------------------------------------------------------
# Bans
# ---------------------------------------------------------------------------
[bans]
multiple-versions = "warn"  # downgraded from deny — see scaling note below
wildcards = "deny"
highlight = "all"
# Crates we never want in the graph because they were abandoned or
# superseded.
deny = [
    { name = "argonautica", reason = "Abandoned (last release 2019); use argon2 RustCrypto." },
    { name = "argon2rs",    reason = "Abandoned (last release 2017); use argon2 RustCrypto." },
    { name = "openssl",     reason = "Prefer rustls + RustCrypto / aws-lc-rs." },
]
# Allow common duplicates in the transitive graph (mostly proc-macro
# crates that lag a major version behind).
skip = []
skip-tree = []

# ---------------------------------------------------------------------------
# Sources
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
allow-git        = []
