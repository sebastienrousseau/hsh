name: Release

# Triggered by pushing a semver tag (v0.0.9, v0.1.0, v1.0.0, …).
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write          # required to attach release artefacts
  id-token: write          # required for sigstore keyless signing
  attestations: write      # required for SLSA L3 build provenance
  packages: write          # required to push images, if we add Docker later

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------
  # Quality gate — fmt, clippy, test, doc must all pass before we even
  # consider publishing.
  # ---------------------------------------------------------------------
  quality-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          components: rustfmt, clippy
      - name: Cache cargo registry / target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: test
        run: cargo test --workspace --all-features
      - name: doc
        run: cargo doc --workspace --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"

  # ---------------------------------------------------------------------
  # Tag verification — assert the git tag matches Cargo.toml.
  # ---------------------------------------------------------------------
  verify-version:
    runs-on: ubuntu-latest
    needs: quality-gate
    permissions:
      contents: read
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Extract tag version
        id: extract
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          echo "Tag version: $tag"
          echo "version=$tag" >> "$GITHUB_OUTPUT"
      - name: Cross-check tag against every workspace Cargo.toml
        # The grep+sed version assumed `version = "X"` with single
        # whitespace; the workspace files actually use aligned columns
        # (`version     = "X"`), making the regex miss and the
        # extracted version blank. awk -F'"' is whitespace-insensitive
        # and pulls the quoted value directly.
        run: |
          tag_ver="${{ steps.extract.outputs.version }}"
          fail=0
          for manifest in crates/hsh/Cargo.toml crates/hsh-cli/Cargo.toml \
                          crates/hsh-kms/Cargo.toml crates/hsh-digest/Cargo.toml; do
            cargo_ver="$(awk -F'"' '/^[[:space:]]*version[[:space:]]*=/ {print $2; exit}' "$manifest")"
            if [ "$cargo_ver" != "$tag_ver" ]; then
              echo "::error::tag $tag_ver != $manifest $cargo_ver"
              fail=1
            else
              echo "OK: $manifest = $cargo_ver"
            fi
          done
          exit "$fail"

  # ---------------------------------------------------------------------
  # SBOM generation via cargo-about.
  # ---------------------------------------------------------------------
  sbom:
    runs-on: ubuntu-latest
    needs: verify-version
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - name: Install cargo-about
        run: cargo install --locked cargo-about
      - name: Generate plain-text NOTICE
        run: |
          mkdir -p artifacts
          cargo about generate --output-file artifacts/NOTICE.md doc/about.md.hbs \
            || echo "no template yet — emitting `cargo about` raw output instead" \
            && cargo about generate --output-file artifacts/NOTICE.md \
                <(echo '{{#each licenses}}- {{name}} ({{spdx_id}}){{/each}}') \
            || true
      - name: Cargo tree manifest
        run: cargo tree --workspace --all-features --no-default-features > artifacts/CARGO-TREE.txt || true
      - name: Upload SBOM artefacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: artifacts/

  # ---------------------------------------------------------------------
  # SLSA L3 build provenance + sigstore keyless signing.
  #
  # The attest-build-provenance action does SLSA L3 in-toto attestations
  # using the GitHub OIDC token. cosign sign-blob with --yes uses the
  # same OIDC for keyless signing through Fulcio + Rekor.
  # ---------------------------------------------------------------------
  attest:
    runs-on: ubuntu-latest
    needs: sbom
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - name: Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build release artefact
        run: |
          mkdir -p artifacts
          cargo build --release --workspace
          cp target/release/hsh artifacts/hsh-${{ needs.verify-version.outputs.version }}-x86_64-unknown-linux-gnu \
            || echo "no binary — library-only release"
          (cd artifacts && find . -type f -exec sha256sum {} +) > artifacts/SHA256SUMS || true
      - name: Generate SLSA build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: artifacts/
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Keyless sign every artefact
        run: |
          for f in artifacts/*; do
            [ -f "$f" ] || continue
            cosign sign-blob --yes --output-signature "${f}.sig" --output-certificate "${f}.pem" "$f"
          done
      - name: Upload signed artefacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: signed-artefacts
          path: artifacts/

  # ---------------------------------------------------------------------
  # Publish to crates.io in dependency order. hsh-kms / hsh-digest have
  # no internal deps; hsh-cli depends on hsh; hsh depends on hsh-kms +
  # hsh-digest (behind feature gates) so it must publish AFTER them.
  # ---------------------------------------------------------------------
  publish:
    runs-on: ubuntu-latest
    needs: [verify-version, attest]
    environment: crates-io
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - name: "Cargo publish (dep order: hsh-kms → hsh-digest → hsh → hsh-cli)"
        # `cargo publish` for hsh / hsh-cli will fail-fast if the
        # transitive workspace crates haven't appeared on crates.io
        # yet. The `sleep` between publishes lets the registry index
        # propagate before the next dependent crate tries to resolve.
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_API_TOKEN }}
        run: |
          cargo publish -p hsh-kms     --token "$CARGO_REGISTRY_TOKEN"
          sleep 30
          cargo publish -p hsh-digest  --token "$CARGO_REGISTRY_TOKEN"
          sleep 30
          cargo publish -p hsh         --token "$CARGO_REGISTRY_TOKEN"
          sleep 30
          cargo publish -p hsh-cli     --token "$CARGO_REGISTRY_TOKEN"

  # ---------------------------------------------------------------------
  # Create the GitHub Release page and attach the signed artefacts +
  # SBOM + NOTICE produced by the earlier jobs. Notes come from the
  # matching CHANGELOG.md `[X.Y.Z]` section, extracted at run time.
  # ---------------------------------------------------------------------
  github-release:
    runs-on: ubuntu-latest
    needs: [verify-version, attest, publish]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download signed artefacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: signed-artefacts
          path: artifacts/
      - name: Download SBOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sbom
          path: sbom/
        continue-on-error: true
      - name: Extract release notes from CHANGELOG
        id: notes
        env:
          VERSION: ${{ needs.verify-version.outputs.version }}
        run: |
          # Pull lines between `## [<VERSION>]` and the next `## [` header.
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" { in_section = 1; next }
            in_section && /^## \[/   { exit }
            in_section               { print }
          ' CHANGELOG.md > release-notes.md
          echo "Notes (first 30 lines):"
          head -30 release-notes.md
          echo "notes-path=release-notes.md" >> "$GITHUB_OUTPUT"
      - name: Create / update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.verify-version.outputs.version }}
        run: |
          tag="v${VERSION}"
          # `gh release create` fails if the release already exists;
          # in that case fall through to `edit` (handles workflow re-runs).
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --notes-file release-notes.md \
              --title "$tag" \
              --verify-tag
          else
            gh release create "$tag" \
              --title "$tag" \
              --notes-file release-notes.md \
              --verify-tag
          fi
          # Attach every signed artefact + the SBOM if present.
          if compgen -G "artifacts/*" >/dev/null; then
            gh release upload "$tag" artifacts/* --clobber
          fi
          if compgen -G "sbom/*" >/dev/null; then
            gh release upload "$tag" sbom/* --clobber
          fi
