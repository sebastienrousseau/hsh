# Codacy configuration.
#
# Codacy uses `remark-lint` as the engine for Markdown (NOT
# `markdownlint`). This file uses the v2 config schema documented at
# https://docs.codacy.com/repositories-configure/codacy-configuration-file/

---
engines:
  # Suppress Markdown lint findings on prose files. The repository
  # documentation uses the Noyalib documentation standard which
  # legitimately uses inline HTML for centred logos / badges, exceeds
  # 80-character lines in tables and code-fenced commands, and keeps
  # the same H3 set (Added / Changed / Fixed / Removed) across every
  # CHANGELOG release per Keep-a-Changelog 1.1.0.
  remark-lint:
    enabled: false

  # We don't gate on prose-style for the docs/ ADRs or the
  # crate-internal architecture notes either.
  markdownlint:
    enabled: false

  prospector:
    enabled: false        # Python-only; no Python in this repo

# Paths Codacy should not scan at all. Codacy's exclude_paths uses
# .gitignore-style globs.
exclude_paths:
  - "target/**"
  - "fuzz/corpus/**"
  - "fuzz/artifacts/**"
  - "**/*.lock"
  - "**/*.svg"
  - "**/*.png"
  - "pkg/homebrew/Formula/**"
  - "pkg/scoop/**"
  - "pkg/debian/changelog"
  - "crates/*/tests/**"
  - "crates/*/examples/**"
  - "crates/*/benches/**"
  - "doc/adr/**"
  - "TEMPLATE.md"
  # Prose files — the engines are disabled above, but defence in depth.
  - "README.md"
  - "**/README.md"
  - "CHANGELOG.md"
  - "CONTRIBUTING.md"
  - "SECURITY.md"
  - "AUTHORS.md"
  - "doc/**"
